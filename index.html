<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUXE |</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,700;1,900&family=Inter:wght@300;400;600;800;900&display=swap');
        :root { --bg: #FAF8F2; --card: #FFFFFF; --text: #1a1a1a; --accent: #2D9B7C; }
        @media (prefers-color-scheme: dark) { :root { --bg: #121414; --card: #1C1F1F; --text: #ffffff; --accent: #42BFA0; } }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.4s; overflow-x: hidden; }
        .barlow { font-family: 'Barlow Condensed', sans-serif; }
        .screen { transition: 0.5s ease; opacity: 1; }
        .screen-hidden { opacity: 0; transform: translateY(20px); pointer-events: none; position: absolute; width: 100%; }
        .card { background: var(--card); border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border-left: 8px solid var(--accent); }
        .muscle-chip { transition: 0.2s; border: 1px solid rgba(45, 155, 124, 0.15); background: rgba(45, 155, 124, 0.05); }
        .muscle-chip.active { background: var(--accent); color: #000; font-weight: 900; border-color: var(--accent); }
        .lvl-btn { transition: 0.3s; border: 1px solid rgba(45, 155, 124, 0.2); color: var(--accent); font-weight: 800; opacity: 0.5; }
        .lvl-btn.active { background: var(--accent); color: #000 !important; opacity: 1; border-color: var(--accent); }
        
        /* NAVIGATION OPTIMISÉE */
        .btn-nav { font-size: 14px; font-weight: 900; opacity: 0.4; transition: 0.3s; padding: 10px 20px; }
        .active-nav { opacity: 1; color: var(--accent); transform: scale(1.1); }
        .glass { background: rgba(250, 248, 242, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05); }
        
        .btn-primary { background-color: var(--accent) !important; color: #000 !important; font-weight: 900 !important; text-transform: uppercase; font-style: italic; }
        .chart-container { display: flex; align-items: flex-end; justify-content: space-between; height: 100px; gap: 4px; padding: 10px 5px; }
        .chart-bar-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
        .chart-bar { background: var(--accent); width: 80%; border-radius: 4px; min-height: 2px; opacity: 0.1; transition: 0.5s; }
        .chart-bar.active { opacity: 1; }
        .xp-bar-bg { background: rgba(0,0,0,0.05); border-radius: 10px; height: 10px; width: 100%; overflow: hidden; }
        .xp-bar-fill { background: var(--accent); height: 100%; width: 0%; transition: 1s ease-out; }
        .toggle-btn { position: relative; width: 44px; height: 22px; background: #ccc; border-radius: 11px; transition: 0.3s; }
        .toggle-btn.active { background: var(--accent); }
        .toggle-dot { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: white; border-radius: 50%; transition: 0.3s; }
        .toggle-btn.active .toggle-dot { left: 24px; }
        .badge-mini { font-size: 24px; filter: grayscale(1); opacity: 0.15; transition: 0.4s; }
        .badge-mini.unlocked { filter: grayscale(0); opacity: 1; transform: scale(1.1); }
        #muscle-selector-container { transition: all 0.4s ease-in-out; max-height: 500px; opacity: 1; overflow: hidden; }
        #muscle-selector-container.collapsed { max-height: 0; opacity: 0; margin-bottom: 0; pointer-events: none; }
        #ex-reps { font-weight: 900; letter-spacing: -5px; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-40">

    <nav class="fixed bottom-0 left-0 right-0 glass px-6 py-10 flex justify-around items-center rounded-t-[50px] z-[100] max-w-md mx-auto">
        <button onclick="showScreen('main-screen')" class="btn-nav active-nav flex flex-col items-center" id="nav-home">
            <span class="barlow uppercase italic">⚡ Fluxe</span>
        </button>
        <button onclick="showScreen('logbook-screen'); renderLogbook();" class="btn-nav flex flex-col items-center" id="nav-log">
            <span class="barlow uppercase italic">📊 Journal</span>
        </button>
    </nav>

    <div id="main-screen" class="screen p-6">
        <header class="flex justify-between items-center py-6">
            <div>
                <h1 class="text-3xl font-[900] italic uppercase text-emerald-700 leading-none barlow">FLUXE</h1>
                <p class="text-[10px] font-black opacity-40 uppercase mt-1">Niveau <span id="user-lvl">1</span></p>
            </div>
            <div id="streak-counter" class="text-[10px] font-black px-4 py-2 rounded-full bg-emerald-100 text-emerald-800 dark:bg-emerald-950 dark:text-emerald-400 uppercase">🔥 0 SESSIONS</div>
        </header>

        <div class="xp-bar-bg mb-8"><div id="xp-fill" class="xp-bar-fill"></div></div>

        <div id="resume-card" class="hidden card p-5 mb-6 border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 flex justify-between items-center border-l-0 border-r-8">
            <div><span class="text-[10px] font-black uppercase italic text-emerald-700">En cours</span><p class="text-[8px] font-bold opacity-50">Reprendre le flux ?</p></div>
            <button onclick="resumeWorkout()" class="px-5 py-2 bg-emerald-600 text-white rounded-full text-[10px] font-black uppercase shadow-lg">Reprendre</button>
        </div>

        <div class="flex items-center justify-between mb-6 px-2 bg-emerald-50 dark:bg-emerald-950/20 p-4 rounded-2xl border border-emerald-100 dark:border-emerald-900">
            <div><span class="text-xs font-black uppercase italic">Mode Express</span><p class="text-[8px] opacity-50 uppercase font-bold">Mix 6 exercices</p></div>
            <button onclick="toggleExpress()" id="express-toggle" class="toggle-btn"><div class="toggle-dot"></div></button>
        </div>

        <div id="workout-controls">
            <div class="flex gap-2 mb-4">
                <button onclick="setLevel(0.5, this, 'beginner')" class="lvl-btn flex-1 py-3 rounded-xl font-black text-[9px] uppercase">Débutant</button>
                <button onclick="setLevel(1.0, this, 'intermediate')" class="lvl-btn active flex-1 py-3 rounded-xl font-black text-[9px] uppercase">Intermédiaire</button>
                <button onclick="setLevel(1.8, this, 'advanced')" class="lvl-btn flex-1 py-3 rounded-xl font-black text-[9px] uppercase">Avancé</button>
            </div>
            <div id="muscle-selector-container" class="grid grid-cols-2 gap-3 mb-8">
                <button onclick="toggleMuscle('Pectoraux', this)" class="muscle-chip py-4 rounded-2xl font-bold text-xs uppercase italic text-black dark:text-white">Pectoraux</button>
                <button onclick="toggleMuscle('Dos', this)" class="muscle-chip py-4 rounded-2xl font-bold text-xs uppercase italic text-black dark:text-white">Dos</button>
                <button onclick="toggleMuscle('Jambes', this)" class="muscle-chip py-4 rounded-2xl font-bold text-xs uppercase italic text-black dark:text-white">Jambes</button>
                <button onclick="toggleMuscle('Abdos', this)" class="muscle-chip py-4 rounded-2xl font-bold text-xs uppercase italic text-black dark:text-white">Abdos</button>
                <button onclick="toggleMuscle('Épaules', this)" class="muscle-chip py-4 rounded-2xl font-bold text-xs uppercase italic text-black dark:text-white">Épaules</button>
                <button onclick="toggleMuscle('Bras', this)" class="muscle-chip py-4 rounded-2xl font-bold text-xs uppercase italic text-black dark:text-white">Bras</button>
            </div>
            <button onclick="generateWorkout()" class="btn-primary w-full py-7 rounded-[30px] text-xl shadow-xl uppercase barlow">Activer le Fluxe <span id="exo-count-preview" class="opacity-40 ml-2"></span></button>
        </div>
    </div>

    <div id="logbook-screen" class="screen screen-hidden p-6">
        <h2 class="text-3xl font-black mb-6 italic text-emerald-700 uppercase barlow text-center">Discipline</h2>
        <div id="badge-row" class="flex justify-around bg-emerald-50 dark:bg-emerald-950/20 p-5 rounded-[30px] mb-6 border border-emerald-100 dark:border-emerald-900">
            <span id="b-1" class="badge-mini" title="1ère session">🌱</span>
            <span id="b-2" class="badge-mini" title="Niveau 5">🔥</span>
            <span id="b-3" class="badge-mini" title="10 sessions">🏆</span>
            <span id="b-4" class="badge-mini" title="Niveau 10">👑</span>
        </div>
        
        <div class="card p-6 mb-8 border-l-0 border-t-8 border-emerald-500">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-[9px] font-black opacity-40 uppercase">Volume Hebdomadaire</h3>
                <div class="flex gap-3 items-center">
                    <button onclick="changeWeek(-1)" class="w-6 h-6 flex items-center justify-center bg-emerald-100 dark:bg-emerald-900 rounded-full text-emerald-700 text-xs font-black">←</button>
                    <span id="chart-date-range" class="text-[8px] font-black opacity-60 uppercase">Cette semaine</span>
                    <button onclick="changeWeek(1)" id="next-week-btn" class="w-6 h-6 flex items-center justify-center bg-emerald-100 dark:bg-emerald-900 rounded-full text-emerald-700 text-xs font-black opacity-20" disabled>→</button>
                </div>
            </div>
            <div class="chart-container" id="weekly-chart"></div>
        </div>
        
        <div id="log-list" class="space-y-4 pb-32"></div>
    </div>

    <div id="workout-screen" class="hidden fixed inset-0 bg-[#FAF8F2] dark:bg-[#121414] z-[1000] flex flex-col p-6">
        <div class="grow flex flex-col justify-center items-center text-center">
            <div class="flex items-center gap-3 mb-2">

                <button onclick="showInfo()" class="bg-emerald-500 text-black w-8 h-8 rounded-full text-[14px] font-black flex items-center justify-center">?</button>
            </div>
            <p id="ex-desc" class="text-[10px] font-bold uppercase tracking-wider opacity-40 mb-6 text-emerald-600">---</p>
            <div class="flex items-baseline gap-2"><span id="ex-reps" class="text-9xl text-emerald-600 font-black barlow">0</span><span class="text-2xl font-black opacity-20 uppercase">Reps</span></div>
            <p id="step-counter-text" class="mt-8 font-bold opacity-30 uppercase text-emerald-600">Flux 1/X</p>
        </div>
        <button onclick="nextStep()" class="btn-primary w-full py-8 rounded-[35px] text-2xl mb-10 barlow">Suivant</button>
    </div>

    <div id="feedback-screen" class="hidden fixed inset-0 bg-[#FAF8F2] dark:bg-[#121414] z-[2000] flex flex-col p-10 justify-center text-center">
        <h2 class="text-3xl font-black italic uppercase barlow">Flux Terminé !</h2>

            <button onclick="finishWithFeedback('Parfait')" class="text-4xl hover:scale-110 transition">🔥</button>
            <button onclick="finishWithFeedback('Dur')" class="text-4xl hover:scale-110 transition">💀</button>
        </div>
        <p id="xp-gain-text" class="text-emerald-600 font-black italic text-xl barlow">+ 0 XP</p>
    </div>

    <div id="info-modal" class="hidden fixed inset-0 z-[3000] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm">

            <h3 id="modal-title" class="text-xl font-black italic uppercase mb-4 text-emerald-600 barlow border-b border-emerald-100 pb-2">Guide</h3>

            <button onclick="closeInfo()" class="w-full py-5 bg-emerald-500 text-black rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg">OK</button>
        </div>
    </div>

        // Mise à jour de la fonction showInfo pour gérer les retours à la ligne
        function showInfo() {
            const ex = currentWorkout[currentStepIndex];
            document.getElementById('modal-title').innerText = ex.n;
            // Utilisation de innerHTML pour transformer les \n en <br>
            document.getElementById('modal-text').innerHTML = ex.h.replace(/\n/g, '<br>');
            document.getElementById('info-modal').classList.remove('hidden');
        }

        let selectedMuscles = [], currentWorkout = [], currentStepIndex = 0, intensity = 1.0, levelKey = 'intermediate', isExpress = false, wakeLock = null;
        let currentChartWeekOffset = 0;

        async function requestWakeLock() { try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {} }

        function toggleExpress() {
            isExpress = !isExpress;
            document.getElementById('express-toggle').classList.toggle('active');
            document.getElementById('muscle-selector-container').classList.toggle('collapsed', isExpress);
            updateExoPreview();
        }

        function setLevel(val, btn, key) {
            intensity = val; levelKey = key;
            document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleMuscle(name, btn) {
            if (selectedMuscles.includes(name)) { selectedMuscles = selectedMuscles.filter(m => m !== name); btn.classList.remove('active'); }
            else { selectedMuscles.push(name); btn.classList.add('active'); }
            updateExoPreview();
        }

        function updateExoPreview() {
            let count = isExpress ? 6 : selectedMuscles.length * 3;
            document.getElementById('exo-count-preview').innerText = (isExpress || selectedMuscles.length > 0) ? `(${count})` : "";
        }

        function generateWorkout() {
            let pool = [];
            if (isExpress) {
                Object.keys(exerciseLibrary).forEach(m => pool = pool.concat(exerciseLibrary[m][levelKey]));
                pool = pool.sort(() => 0.5 - Math.random());
                currentWorkout = pool.slice(0, 6);
                selectedMuscles = ['Full Body'];
            } else {
                if (selectedMuscles.length === 0) return;
                selectedMuscles.forEach(m => pool = pool.concat(exerciseLibrary[m][levelKey]));
                pool = pool.sort(() => 0.5 - Math.random());
                currentWorkout = pool.slice(0, selectedMuscles.length * 3);
            }
            currentStepIndex = 0;
            Storage.set('active_session', { workout: currentWorkout, index: 0, muscles: selectedMuscles });
            startWorkoutMode();
        }

        function startWorkoutMode() { updateStepUI(); document.getElementById('workout-screen').classList.remove('hidden'); requestWakeLock(); }

        function resumeWorkout() {
            const active = Storage.get('active_session', null);
            if(active) { currentWorkout = active.workout; currentStepIndex = active.index; selectedMuscles = active.muscles; document.getElementById('resume-card').classList.add('hidden'); startWorkoutMode(); }
        }

        function updateStepUI() {
            const ex = currentWorkout[currentStepIndex];
            document.getElementById('ex-name').innerText = ex.n;
            document.getElementById('ex-desc').innerText = ex.d;
            document.getElementById('ex-reps').innerText = Math.ceil(ex.r * intensity);
            document.getElementById('step-counter-text').innerText = `Flux ${currentStepIndex + 1}/${currentWorkout.length}`;
        }

        function nextStep() {
            if(currentStepIndex < currentWorkout.length - 1) { 
                currentStepIndex++; 
                const active = Storage.get('active_session', null);
                if(active) { active.index = currentStepIndex; Storage.set('active_session', active); }
                updateStepUI(); 
            } else { 
                Storage.set('active_session', null);
                if (wakeLock) { wakeLock.release(); wakeLock = null; }
                document.getElementById('workout-screen').classList.add('hidden');
                document.getElementById('xp-gain-text').innerText = `+ ${currentWorkout.length * 10} XP`;
                document.getElementById('feedback-screen').classList.remove('hidden');
            }
        }

        function finishWithFeedback(feeling) {
            const xpGained = currentWorkout.length * 10;
            let userData = Storage.get('fluxe_user_data', { xp: 0, level: 1 });
            userData.xp += xpGained;
            if(userData.xp >= userData.level * 100) { userData.xp -= (userData.level * 100); userData.level++; }
            Storage.set('fluxe_user_data', userData);

            const history = Storage.get('fluxe_history');
            const now = new Date();
            history.unshift({ y: now.getFullYear(), m: now.getMonth(), d: now.getDate(), displayDate: now.toLocaleDateString(), muscle: selectedMuscles.join('+'), volume: currentWorkout.length, feeling: feeling });
            Storage.set('fluxe_history', history);

            document.getElementById('feedback-screen').classList.add('hidden');
            showScreen('main-screen');
            updateProgression();
            renderLogbook();
        }

        function changeWeek(dir) {
            currentChartWeekOffset += dir;
            if (currentChartWeekOffset > 0) currentChartWeekOffset = 0;
            document.getElementById('next-week-btn').disabled = (currentChartWeekOffset === 0);
            document.getElementById('next-week-btn').classList.toggle('opacity-20', currentChartWeekOffset === 0);
            renderChart();
        }

        function renderChart() {
            const history = Storage.get('fluxe_history');
            const chart = document.getElementById('weekly-chart');
            if(!chart) return; chart.innerHTML = '';
            const today = new Date();
            const startOfWeek = new Date(today);
            const dayShift = (today.getDay() === 0 ? -6 : 1) - today.getDay();
            startOfWeek.setDate(today.getDate() + dayShift + (currentChartWeekOffset * 7));
            startOfWeek.setHours(0,0,0,0);
            const options = { day: 'numeric', month: 'short' };
            const endOfWeek = new Date(startOfWeek); endOfWeek.setDate(startOfWeek.getDate() + 6);
            document.getElementById('chart-date-range').innerText = currentChartWeekOffset === 0 ? "Cette semaine" : 
                `${startOfWeek.toLocaleDateString('fr-FR', options)} - ${endOfWeek.toLocaleDateString('fr-FR', options)}`;

            for(let i=0; i<7; i++) {
                const d = new Date(startOfWeek); d.setDate(startOfWeek.getDate() + i);
                const daySessions = history.filter(h => h.y === d.getFullYear() && h.m === d.getMonth() && h.d === d.getDate());
                const vol = daySessions.reduce((acc, s) => acc + s.volume, 0);
                chart.innerHTML += `<div class="chart-bar-wrapper"><div class="chart-bar ${vol>0?'active':''}" style="height:${Math.min(vol*8, 100)}%"></div><span class="text-[7px] font-black mt-2 opacity-30">${['DIM','LUN','MAR','MER','JEU','VEN','SAM'][d.getDay()]}</span></div>`;
            }
        }

        function renderLogbook() {
            const history = Storage.get('fluxe_history');
            const list = document.getElementById('log-list');
            list.innerHTML = history.slice(0, 10).map(h => `
                <div class="card p-5 flex justify-between items-center">
                    <div><span class="text-[9px] font-black opacity-30">${h.displayDate}</span><div class="font-black italic uppercase text-xs">${h.muscle}</div></div>
                    <div class="text-[9px] font-black text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full">${h.volume} EXOS - ${h.feeling}</div>
                </div>`).join('');
            renderChart();
            document.getElementById('streak-counter').innerText = `🔥 ${history.length} SESSIONS`;
            const userData = Storage.get('fluxe_user_data', { level: 1 });
            if(history.length >= 1) document.getElementById('b-1').classList.add('unlocked');
            if(userData.level >= 5) document.getElementById('b-2').classList.add('unlocked');
            if(history.length >= 10) document.getElementById('b-3').classList.add('unlocked');
            if(userData.level >= 10) document.getElementById('b-4').classList.add('unlocked');
        }

        function updateProgression() {
            const userData = Storage.get('fluxe_user_data', { xp: 0, level: 1 });
            document.getElementById('user-lvl').innerText = userData.level;
            document.getElementById('xp-fill').style.width = `${(userData.xp / (userData.level * 100)) * 100}%`;
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('screen-hidden'));
            document.getElementById(id).classList.remove('screen-hidden');
            document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active-nav'));
            document.getElementById(id === 'main-screen' ? 'nav-home' : 'nav-log').classList.add('active-nav');
        }

        function showInfo() {
            const ex = currentWorkout[currentStepIndex];
            document.getElementById('modal-title').innerText = ex.n;
            document.getElementById('modal-text').innerText = ex.h;
            document.getElementById('info-modal').classList.remove('hidden');
        }
        function closeInfo() { document.getElementById('info-modal').classList.add('hidden'); }

        window.onload = () => { updateProgression(); renderLogbook(); if(Storage.get('active_session', null)) document.getElementById('resume-card').classList.remove('hidden'); };
    </script>
</body>
