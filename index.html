<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLUXE - Fitness App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2D9B7C">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,700;1,900&family=Inter:wght@300;400;600;800;900&display=swap');
        :root { --bg: #FAF8F2; --card: #FFFFFF; --text: #1a1a1a; --accent: #2D9B7C; }
        @media (prefers-color-scheme: dark) { :root { --bg: #121414; --card: #1C1F1F; --text: #ffffff; --accent: #42BFA0; } }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.4s; overflow-x: hidden; }
        .barlow { font-family: 'Barlow Condensed', sans-serif; }
        .screen { transition: 0.5s ease; opacity: 1; }
        .screen-hidden { display: none; opacity: 0; }
        .card { background: var(--card); border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border-left: 8px solid var(--accent); }
        .muscle-chip { transition: 0.2s; border: 1px solid rgba(45, 155, 124, 0.15); background: rgba(45, 155, 124, 0.05); }
        .muscle-chip.active { background: var(--accent); color: #000; font-weight: 900; border-color: var(--accent); }
        .lvl-btn { transition: 0.3s; border: 1px solid rgba(45, 155, 124, 0.2); color: var(--accent); font-weight: 800; opacity: 0.5; }
        .lvl-btn.active { background: var(--accent); color: #000 !important; opacity: 1; border-color: var(--accent); }
        .btn-nav { font-size: 14px; font-weight: 900; opacity: 0.4; transition: 0.3s; }
        .active-nav { opacity: 1; color: var(--accent); transform: scale(1.1); }
        .glass { background: rgba(250, 248, 242, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05); }
        .btn-primary { background-color: var(--accent) !important; color: #000 !important; font-weight: 900 !important; text-transform: uppercase; font-style: italic; }
        .xp-bar-bg { background: rgba(0,0,0,0.05); border-radius: 10px; height: 10px; width: 100%; overflow: hidden; }
        .xp-bar-fill { background: var(--accent); height: 100%; width: 0%; transition: 1s ease-out; }
        .toggle-btn { position: relative; width: 44px; height: 22px; background: #ccc; border-radius: 11px; transition: 0.3s; }
        .toggle-btn.active { background: var(--accent); }
        .toggle-dot { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: white; border-radius: 50%; transition: 0.3s; }
        .toggle-btn.active .toggle-dot { left: 24px; }
        .chart-container { display: flex; align-items: flex-end; justify-content: space-between; height: 100px; gap: 4px; }
        .chart-bar { background: var(--accent); width: 100%; border-radius: 4px; min-height: 2px; opacity: 0.2; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-40">

    <nav class="fixed bottom-0 left-0 right-0 glass px-6 py-8 flex justify-around items-center rounded-t-[50px] z-[100] max-w-md mx-auto">
        <button onclick="showScreen('main-screen')" class="btn-nav active-nav flex flex-col items-center" id="nav-home"><span class="barlow uppercase italic">⚡ Fluxe</span></button>
        <button onclick="showScreen('logbook-screen'); renderLogbook();" class="btn-nav flex flex-col items-center" id="nav-log"><span class="barlow uppercase italic">📊 Journal</span></button>
    </nav>

    <div id="main-screen" class="screen p-6">
        <header class="flex justify-between items-center py-6">
            <div>
                <h1 class="text-4xl font-[900] italic uppercase text-emerald-700 barlow">FLUXE</h1>
                <p class="text-[10px] font-black opacity-40 uppercase">Niveau <span id="user-lvl">1</span></p>
            </div>
            <div id="streak-counter" class="text-[10px] font-black px-4 py-2 rounded-full bg-emerald-100 text-emerald-800 dark:bg-emerald-950/20 uppercase">🔥 0 SESSIONS</div>
        </header>

        <div class="xp-bar-bg mb-8"><div id="xp-fill" class="xp-bar-fill"></div></div>

        <div id="resume-card" class="hidden card p-5 mb-6 border-emerald-500 bg-emerald-50 dark:bg-emerald-900/30 flex justify-between items-center border-l-0 border-r-8">
            <div><span class="text-[10px] font-black uppercase italic text-emerald-700">En cours</span><p class="text-[8px] font-bold opacity-50">Reprendre le flux ?</p></div>
            <button onclick="resumeWorkout()" class="px-5 py-2 bg-emerald-600 text-white rounded-full text-[10px] font-black uppercase shadow-lg">Reprendre</button>
        </div>

        <div class="flex items-center justify-between mb-6 bg-emerald-50 dark:bg-emerald-950/20 p-4 rounded-2xl border border-emerald-100">
            <div><span class="text-xs font-black uppercase italic">Mode Express</span><p class="text-[8px] opacity-50 font-bold uppercase">6 exercices max</p></div>
            <button onclick="toggleExpress()" id="express-toggle" class="toggle-btn"><div class="toggle-dot"></div></button>
        </div>

        <div class="flex gap-2 mb-4">
            <button onclick="setLevel(0.5, this, 'beginner')" class="lvl-btn flex-1 py-3 rounded-xl text-[9px] uppercase">Débutant</button>
            <button onclick="setLevel(1.0, this, 'intermediate')" class="lvl-btn active flex-1 py-3 rounded-xl text-[9px] uppercase">Intermédiaire</button>
            <button onclick="setLevel(1.8, this, 'advanced')" class="lvl-btn flex-1 py-3 rounded-xl text-[9px] uppercase">Avancé</button>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-8">
            <button onclick="toggleMuscle('Pectoraux', this)" class="muscle-chip py-4 rounded-2xl font-bold text-xs uppercase italic">Pectoraux</button>
            <button onclick="toggleMuscle('Dos', this)" class="muscle-chip py-4 rounded-2xl font-bold text-xs uppercase italic">Dos</button>
            <button onclick="toggleMuscle('Jambes', this)" class="muscle-chip py-4 rounded-2xl font-bold text-xs uppercase italic">Jambes</button>
            <button onclick="toggleMuscle('Abdos', this)" class="muscle-chip py-4 rounded-2xl font-bold text-xs uppercase italic">Abdos</button>
            <button onclick="toggleMuscle('Épaules', this)" class="muscle-chip py-4 rounded-2xl font-bold text-xs uppercase italic">Épaules</button>
            <button onclick="toggleMuscle('Bras', this)" class="muscle-chip py-4 rounded-2xl font-bold text-xs uppercase italic">Bras</button>
        </div>

        <button onclick="generateWorkout()" class="btn-primary w-full py-6 rounded-[30px] text-xl shadow-xl barlow">Activer le Fluxe</button>
    </div>

    <div id="logbook-screen" class="screen screen-hidden p-6">
        <h2 class="text-3xl font-black mb-6 italic text-emerald-700 uppercase barlow text-center">Journal</h2>
        <div class="card p-5 mb-8 border-emerald-500/30">
    <div class="flex justify-between items-end mb-4">
        <h3 class="text-[10px] font-black uppercase italic text-emerald-600">Activité (7 derniers jours)</h3>
        <span id="total-week-ex" class="text-[10px] font-bold opacity-50">0 exos</span>
    </div>
    <div id="activity-chart" class="chart-container">
        </div>
    <div class="flex justify-between mt-2 opacity-30 text-[8px] font-bold uppercase">
        <span>Lun</span><span>Mar</span><span>Mer</span><span>Jeu</span><span>Ven</span><span>Sam</span><span>Dim</span>
    </div>
</div>
        <div id="log-list" class="space-y-4"></div>
    </div>

    <div id="workout-screen" class="hidden fixed inset-0 bg-[#FAF8F2] dark:bg-[#121414] z-[1000] flex flex-col p-6">
        <div class="grow flex flex-col justify-center items-center text-center">
            <div class="flex items-center gap-3 mb-2">
                <h2 id="ex-name" class="text-3xl font-black italic uppercase barlow">---</h2>
                <button onclick="showInfo()" class="bg-emerald-500 text-black w-8 h-8 rounded-full font-black">?</button>
            </div>
            <p id="ex-desc" class="text-[10px] font-bold uppercase opacity-40 mb-6 text-emerald-600">---</p>
            <div class="flex items-baseline gap-2"><span id="ex-reps" class="text-8xl text-emerald-600 font-black barlow">0</span><span class="text-xl font-black opacity-20 uppercase">Reps</span></div>
            <p id="step-counter-text" class="mt-8 font-bold opacity-30 uppercase text-emerald-600">Flux 1/X</p>
        </div>
        <button onclick="nextStep()" class="btn-primary w-full py-8 rounded-[35px] text-2xl mb-10 barlow">Suivant</button>
    </div>

    <div id="feedback-screen" class="hidden fixed inset-0 bg-[#FAF8F2] dark:bg-[#121414] z-[2000] flex flex-col p-10 justify-center text-center">

        <div class="flex justify-around my-12">
            <button onclick="finishWithFeedback('😃')" class="text-5xl hover:scale-125 transition">😃</button>
            <button onclick="finishWithFeedback('🔥')" class="text-5xl hover:scale-125 transition">🔥</button>
            <button onclick="finishWithFeedback('💀')" class="text-5xl hover:scale-125 transition">💀</button>
        </div>
        <p id="xp-gain-text" class="text-emerald-600 font-black italic text-xl barlow">+ 0 XP</p>
    </div>

            <div id="modal-text" class="text-sm leading-relaxed mb-8 opacity-70">---</div>
            <button onclick="closeInfo()" class="w-full py-5 bg-emerald-500 text-black rounded-2xl font-black uppercase text-xs">OK</button>
        </div>
    </div>

                    {n:'Pompes au Mur', r:20, d:'Debout face au mur', h:'• **Placement** : Mains à hauteur d\'épaules sur le mur.\n• **Mouvement** : Amenez le nez près du mur en contrôlant le retour.\n• **Focus** : Idéal pour l\'échauffement ou les débutants complets.'},

                    {n:'Pompes Larges', r:10, d:'Focus Pectoraux', h:'• **Placement** : Mains très écartées (1,5x largeur épaules).\n• **Mouvement** : Descente lente pour sentir l\'étirement du grand pectoral.\n• **Sécurité** : Ne descendez pas trop bas si vous sentez une tension dans l\'épaule.'}

                    {n:'Pompes Diamant', r:12, d:'Mains serrées', h:'• **Placement** : Formez un triangle avec vos index et pouces au sol.\n• **Mouvement** : Amenez le centre de la poitrine sur vos mains.\n• **Focus** : Intense pour l\'intérieur des pecs et les triceps.'},

                    {n:'Pompes Décalées', r:12, d:'Asymétriques', h:'• **Placement** : Une main haute (niveau visage), une main basse (niveau côtes).\n• **Mouvement** : Alternez la position des mains à chaque série.'}

                    {n:'Pompes Australiennes', r:12, d:'Sous table', h:'• **Placement** : Sous une table solide, saisissez le bord.\n• **Mouvement** : Tirez votre buste vers le haut de la table. Corps bien droit.\n• **Sécurité** : Vérifiez la stabilité de la table !'},

                    {n:'Fentes Latérales', r:16, d:'Adducteurs', h:'• **Mouvement** : Faites un grand pas sur le côté et descendez sur cette jambe, l\'autre reste tendue.\n• **Focus** : Gardez le buste le plus droit possible.'},

                    {n:'Nordic Curl Sol', r:8, d:'Ischios', h:'• **Placement** : À genoux, pieds coincés sous un meuble lourd.\n• **Mouvement** : Penchez-vous en avant le plus lentement possible en retenant avec vos jambes.\n• **Sécurité** : Posez les mains devant vous pour amortir la chute.'},

        let selectedMuscles = [], currentWorkout = [], currentStepIndex = 0, levelKey = 'intermediate', isExpress = false;
        let userData = Storage.get('fluxe_user_v1', { lvl: 1, xp: 0, logs: [], streak: 0 });

        function saveProgress() {
            Storage.set('fluxe_backup', { workout: currentWorkout, index: currentStepIndex, lvl: levelKey });
        }

        function checkBackup() {
            const backup = Storage.get('fluxe_backup', null);
            if(backup) document.getElementById('resume-card').classList.remove('hidden');
        }

        function resumeWorkout() {
            const backup = Storage.get('fluxe_backup');
            currentWorkout = backup.workout;
            currentStepIndex = backup.index;
            levelKey = backup.lvl;
            document.getElementById('resume-card').classList.add('hidden');
            document.getElementById('workout-screen').classList.remove('hidden');
            updateStep();
        }

        function toggleMuscle(m, btn) {
            if(selectedMuscles.includes(m)) {
                selectedMuscles = selectedMuscles.filter(x => x !== m);
                btn.classList.remove('active');
            } else {
                selectedMuscles.push(m);
                btn.classList.add('active');
            }
        }

        function setLevel(val, btn, key) {
            levelKey = key;
            document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleExpress() {
            isExpress = !isExpress;
            document.getElementById('express-toggle').classList.toggle('active');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('screen-hidden'));
            document.getElementById(id).classList.remove('screen-hidden');
            document.querySelectorAll('.btn-nav').forEach(n => n.classList.remove('active-nav'));
            if(id === 'main-screen') document.getElementById('nav-home').classList.add('active-nav');
            if(id === 'logbook-screen') document.getElementById('nav-log').classList.add('active-nav');
        }

        function generateWorkout() {
    if(selectedMuscles.length === 0) return alert("Choisis au moins un muscle !");
    
    currentWorkout = [];
    
    // Pour chaque muscle sélectionné, on pioche 3 exercices
    selectedMuscles.forEach(m => {
        const pool = [...exerciseLibrary[m][levelKey]]; // On copie la liste pour pouvoir mélanger
        
        // Mélange aléatoire (Fisher-Yates simple)
        const picked = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
        
        currentWorkout.push(...picked);
    });

    // Si le mode Express est activé, on réduit la séance de moitié (arrondi au supérieur)
    if(isExpress) {
        const expressCount = Math.ceil(currentWorkout.length / 2);
        currentWorkout = currentWorkout.sort(() => 0.5 - Math.random()).slice(0, expressCount);
    }
    
    // Mélange final pour ne pas faire tous les exercices du même muscle à la suite
    currentWorkout = currentWorkout.sort(() => 0.5 - Math.random());
    
    currentStepIndex = 0;
    saveProgress(); // Sauvegarde automatique pour le bouton "Reprendre"
    updateStep();
    document.getElementById('workout-screen').classList.remove('hidden');
}

        function updateStep() {
            const ex = currentWorkout[currentStepIndex];
            document.getElementById('ex-name').innerText = ex.n;
            document.getElementById('ex-desc').innerText = ex.d;
            document.getElementById('ex-reps').innerText = ex.r;
            document.getElementById('step-counter-text').innerText = `Flux ${currentStepIndex + 1}/${currentWorkout.length}`;
        }

        function nextStep() {
            if(currentStepIndex < currentWorkout.length - 1) {
                currentStepIndex++;
                saveProgress();
                updateStep();
            } else {
                Storage.remove('fluxe_backup');
                document.getElementById('workout-screen').classList.add('hidden');
                document.getElementById('feedback-screen').classList.remove('hidden');
                document.getElementById('xp-gain-text').innerText = `+ ${currentWorkout.length * 15} XP`;
            }
        }

        function finishWithFeedback(mood) {
            userData.xp += currentWorkout.length * 15;
            if(userData.xp >= userData.lvl * 100) { userData.xp = 0; userData.lvl++; }
            userData.logs.push({ date: new Date().toISOString(), mood: mood, count: currentWorkout.length });
            userData.streak++;
            Storage.set('fluxe_user_v1', userData);
            document.getElementById('feedback-screen').classList.add('hidden');
            updateUI();
            showScreen('main-screen');
        }

        function updateUI() {
            document.getElementById('user-lvl').innerText = userData.lvl;
            document.getElementById('streak-counter').innerText = `🔥 ${userData.streak} SESSIONS`;
            document.getElementById('xp-fill').style.width = `${(userData.xp / (userData.lvl * 100)) * 100}%`;
        }

        function showInfo() {
            const ex = currentWorkout[currentStepIndex];
            document.getElementById('modal-title').innerText = ex.n;
            document.getElementById('modal-text').innerHTML = ex.h.replace(/\n/g, '<br>');
            document.getElementById('info-modal').classList.remove('hidden');
        }

        function closeInfo() { document.getElementById('info-modal').classList.add('hidden'); }

        function renderLogbook() {
            document.getElementById('log-list').innerHTML = userData.logs.slice().reverse().map(l => `
                <div class="card p-4 flex justify-between items-center">
                    <div><p class="text-[10px] font-black opacity-40">${new Date(l.date).toLocaleDateString()}</p><p class="font-bold text-xs uppercase">${l.count} Exercices</p></div>
                    <span class="text-2xl">${l.mood}</span>
                </div>`).join('');
        }

        updateUI();
        checkBackup();
    </script>
