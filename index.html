    <style>
        @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@1,700;1,900&family=Inter:wght@300;400;600;800;900&display=swap');
        :root { --bg: #FAF8F2; --card: #FFFFFF; --text: #1a1a1a; --accent: #2D9B7C; }
        @media (prefers-color-scheme: dark) { :root { --bg: #121414; --card: #1C1F1F; --text: #ffffff; --accent: #42BFA0; } }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.4s; overflow-x: hidden; }
        .barlow { font-family: 'Barlow Condensed', sans-serif; }
        .screen { transition: 0.5s ease; opacity: 1; }
        .screen-hidden { display: none; opacity: 0; }
        .card { background: var(--card); border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); border-left: 8px solid var(--accent); }
        .muscle-chip { transition: 0.2s; border: 1px solid rgba(45, 155, 124, 0.15); background: rgba(45, 155, 124, 0.05); }
        .muscle-chip.active { background: var(--accent); color: #000; font-weight: 900; border-color: var(--accent); }
        .lvl-btn { transition: 0.3s; border: 1px solid rgba(45, 155, 124, 0.2); color: var(--accent); font-weight: 800; opacity: 0.5; }
        .lvl-btn.active { background: var(--accent); color: #000 !important; opacity: 1; border-color: var(--accent); }
        .btn-nav { font-size: 14px; font-weight: 900; opacity: 0.4; transition: 0.3s; }
        .active-nav { opacity: 1; color: var(--accent); transform: scale(1.1); }
        .glass { background: rgba(250, 248, 242, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.05); }
        .btn-primary { background-color: var(--accent) !important; color: #000 !important; font-weight: 900 !important; text-transform: uppercase; font-style: italic; }
        .xp-bar-bg { background: rgba(0,0,0,0.05); border-radius: 10px; height: 10px; width: 100%; overflow: hidden; }
        .xp-bar-fill { background: var(--accent); height: 100%; width: 0%; transition: 1s ease-out; }
        .toggle-btn { position: relative; width: 44px; height: 22px; background: #ccc; border-radius: 11px; transition: 0.3s; }
        .toggle-btn.active { background: var(--accent); }
        .toggle-dot { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; background: white; border-radius: 50%; transition: 0.3s; }
        .toggle-btn.active .toggle-dot { left: 24px; }
        .chart-container { display: flex; align-items: flex-end; justify-content: space-between; height: 100px; gap: 4px; }
        .chart-bar { background: var(--accent); width: 100%; border-radius: 4px; min-height: 2px; opacity: 0.2; }
    </style>
</head>

        let selectedMuscles = [], currentWorkout = [], currentStepIndex = 0, levelKey = 'intermediate', isExpress = false;
        let userData = Storage.get('fluxe_user_v1', { lvl: 1, xp: 0, logs: [], streak: 0 });

        function saveProgress() {
            Storage.set('fluxe_backup', { workout: currentWorkout, index: currentStepIndex, lvl: levelKey });
        }

        function checkBackup() {
            const backup = Storage.get('fluxe_backup', null);
            if(backup) document.getElementById('resume-card').classList.remove('hidden');
        }

        function resumeWorkout() {
            const backup = Storage.get('fluxe_backup');
            currentWorkout = backup.workout;
            currentStepIndex = backup.index;
            levelKey = backup.lvl;
            document.getElementById('resume-card').classList.add('hidden');
            document.getElementById('workout-screen').classList.remove('hidden');
            updateStep();
        }

        function toggleMuscle(m, btn) {
            if(selectedMuscles.includes(m)) {
                selectedMuscles = selectedMuscles.filter(x => x !== m);
                btn.classList.remove('active');
            } else {
                selectedMuscles.push(m);
                btn.classList.add('active');
            }
        }

        function setLevel(val, btn, key) {
            levelKey = key;
            document.querySelectorAll('.lvl-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function toggleExpress() {
            isExpress = !isExpress;
            document.getElementById('express-toggle').classList.toggle('active');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('screen-hidden'));
            document.getElementById(id).classList.remove('screen-hidden');
            document.querySelectorAll('.btn-nav').forEach(n => n.classList.remove('active-nav'));
            if(id === 'main-screen') document.getElementById('nav-home').classList.add('active-nav');
            if(id === 'logbook-screen') document.getElementById('nav-log').classList.add('active-nav');
        }

        function generateWorkout() {
    if(selectedMuscles.length === 0) return alert("Choisis au moins un muscle !");
    
    currentWorkout = [];
    
    // Pour chaque muscle sélectionné, on pioche 3 exercices
    selectedMuscles.forEach(m => {
        const pool = [...exerciseLibrary[m][levelKey]]; // On copie la liste pour pouvoir mélanger
        
        // Mélange aléatoire (Fisher-Yates simple)
        const picked = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
        
        currentWorkout.push(...picked);
    });

    // Si le mode Express est activé, on réduit la séance de moitié (arrondi au supérieur)
    if(isExpress) {
        const expressCount = Math.ceil(currentWorkout.length / 2);
        currentWorkout = currentWorkout.sort(() => 0.5 - Math.random()).slice(0, expressCount);
    }
    
    // Mélange final pour ne pas faire tous les exercices du même muscle à la suite
    currentWorkout = currentWorkout.sort(() => 0.5 - Math.random());
    
    currentStepIndex = 0;
    saveProgress(); // Sauvegarde automatique pour le bouton "Reprendre"
    updateStep();
    document.getElementById('workout-screen').classList.remove('hidden');
}

        function updateStep() {
            const ex = currentWorkout[currentStepIndex];
            document.getElementById('ex-name').innerText = ex.n;
            document.getElementById('ex-desc').innerText = ex.d;
            document.getElementById('ex-reps').innerText = ex.r;
            document.getElementById('step-counter-text').innerText = `Flux ${currentStepIndex + 1}/${currentWorkout.length}`;
        }

        function nextStep() {
            if(currentStepIndex < currentWorkout.length - 1) {
                currentStepIndex++;
                saveProgress();
                updateStep();
            } else {
                Storage.remove('fluxe_backup');
                document.getElementById('workout-screen').classList.add('hidden');
                document.getElementById('feedback-screen').classList.remove('hidden');
                document.getElementById('xp-gain-text').innerText = `+ ${currentWorkout.length * 15} XP`;
            }
        }

        function finishWithFeedback(mood) {
            userData.xp += currentWorkout.length * 15;
            if(userData.xp >= userData.lvl * 100) { userData.xp = 0; userData.lvl++; }
            userData.logs.push({ date: new Date().toISOString(), mood: mood, count: currentWorkout.length });
            userData.streak++;
            Storage.set('fluxe_user_v1', userData);
            document.getElementById('feedback-screen').classList.add('hidden');
            updateUI();
            showScreen('main-screen');
        }

        function updateUI() {
            document.getElementById('user-lvl').innerText = userData.lvl;
            document.getElementById('streak-counter').innerText = `🔥 ${userData.streak} SESSIONS`;
            document.getElementById('xp-fill').style.width = `${(userData.xp / (userData.lvl * 100)) * 100}%`;
        }

        function showInfo() {
            const ex = currentWorkout[currentStepIndex];
            document.getElementById('modal-title').innerText = ex.n;
            document.getElementById('modal-text').innerHTML = ex.h.replace(/\n/g, '<br>');
            document.getElementById('info-modal').classList.remove('hidden');
        }

        function closeInfo() { document.getElementById('info-modal').classList.add('hidden'); }

        function renderLogbook() {
            document.getElementById('log-list').innerHTML = userData.logs.slice().reverse().map(l => `
                <div class="card p-4 flex justify-between items-center">
                    <div><p class="text-[10px] font-black opacity-40">${new Date(l.date).toLocaleDateString()}</p><p class="font-bold text-xs uppercase">${l.count} Exercices</p></div>
                    <span class="text-2xl">${l.mood}</span>
                </div>`).join('');
        }

        updateUI();
        checkBackup();
    </script>
</body>
</html>
